<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urban Casa - Cash Ledger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media print { .no-print { display: none !important; } }
        .input-focus:focus { outline: 2px solid #f59e0b; border-color: transparent; }
    </style>
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js';
        import { getDatabase, ref, onValue, push, remove } from 'https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js';

        const db = getDatabase(initializeApp({ databaseURL: "https://ledger-ca2e2-default-rtdb.asia-southeast1.firebasedatabase.app/" }));

        // Auto-cap logic: first letter of every word
        const formatText = (str) => {
            return str.toLowerCase().split(' ').map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(' ');
        };

        window.handleInput = (activeId, blockId) => {
            const active = document.getElementById(activeId);
            const block = document.getElementById(blockId);
            block.disabled = active.value.length > 0;
        };

        window.toggleSettings = (show) => { document.getElementById('settings-view').classList.toggle('hidden', !show); };
        
        window.postEntry = () => {
            const d = document.getElementById('date'), p = document.getElementById('proj'), 
                  c = document.getElementById('part'), dr = document.getElementById('debit'), 
                  cr = document.getElementById('credit'), rem = document.getElementById('remarks');

            if(!d.value || !p.value || !c.value || (!dr.value && !cr.value)) return alert("Please fill all fields!");
            
            push(ref(db, 'cash_ledger'), { 
                date: d.value, project: p.value, particulars: c.value, 
                remarks: formatText(rem.value), debit: dr.value || 0, credit: cr.value || 0 
            }).then(() => { 
                d.value = ''; p.value = ''; c.value = ''; dr.value = ''; cr.value = ''; rem.value = '';
                cr.disabled = false; dr.disabled = false;
            });
        };

        window.addSetting = (type) => {
            const input = document.getElementById(`new-${type}`);
            const val = formatText(input.value);
            if(!val) return;
            push(ref(db, `settings/${type}`), val).then(() => { input.value = ''; });
        };

        window.deleteSetting = (type, id) => { remove(ref(db, `settings/${type}/${id}`)); };
        window.deleteEntry = (id) => { if(confirm("Delete this entry?")) remove(ref(db, 'cash_ledger/' + id)); };
        
        onValue(ref(db, 'cash_ledger'), (snap) => { window.globalData = snap.val() || {}; renderTable(); });
        onValue(ref(db, 'settings'), (snap) => {
            const data = snap.val() || {}, projs = data.projects || {}, cats = data.categories || {};
            document.getElementById('proj').innerHTML = '<option value="">Project</option>' + Object.values(projs).map(p => `<option value="${p}">${p}</option>`).join('');
            document.getElementById('part').innerHTML = '<option value="">Category</option>' + Object.values(cats).map(c => `<option value="${c}">${c}</option>`).join('');
            document.getElementById('proj-filter').innerHTML = '<option value="">All Projects</option>' + Object.values(projs).map(p => `<option value="${p}">${p}</option>`).join('');
            document.getElementById('cat-list').innerHTML = Object.entries(cats).map(([id, n]) => `<div class="flex justify-between p-2 border-b text-sm">${n}<button onclick="deleteSetting('categories','${id}')" class="text-red-600 font-bold">✕</button></div>`).join('');
            document.getElementById('proj-list').innerHTML = Object.entries(projs).map(([id, n]) => `<div class="flex justify-between p-2 border-b text-sm">${n}<button onclick="deleteSetting('projects','${id}')" class="text-red-600 font-bold">✕</button></div>`).join('');
        });

        window.renderTable = () => {
            const query = document.getElementById('search-bar').value.toLowerCase(), projFilter = document.getElementById('proj-filter').value;
            let dTot = 0, cTot = 0;
            const entries = Object.entries(window.globalData).sort((a, b) => new Date(b[1].date) - new Date(a[1].date));
            
            document.getElementById('ledger-body').innerHTML = entries.filter(([k, e]) => 
                (e.particulars.toLowerCase().includes(query) || (e.remarks && e.remarks.toLowerCase().includes(query))) && 
                (projFilter ? e.project === projFilter : true)
            ).map(([k, e]) => {
                dTot += parseFloat(e.debit || 0); cTot += parseFloat(e.credit || 0);
                return `
                <tr class="border-b border-slate-200 hover:bg-slate-50 transition">
                    <td class="p-3 text-sm font-mono">${e.date}</td>
                    <td class="p-3 text-sm">${e.project}</td>
                    <td class="p-3">
                        <div class="font-bold text-slate-800">${e.particulars}</div>
                        <div class="text-xs text-slate-500 italic">${e.remarks || ''}</div>
                    </td>
                    <td class="p-3 text-right font-mono text-red-600">${parseFloat(e.debit) > 0 ? parseFloat(e.debit).toFixed(2) : '-'}</td>
                    <td class="p-3 text-right font-mono text-teal-600">${parseFloat(e.credit) > 0 ? parseFloat(e.credit).toFixed(2) : '-'}</td>
                    <td class="p-3 text-center no-print"><button onclick="deleteEntry('${k}')" class="text-slate-300 hover:text-red-500 transition">✕</button></td>
                </tr>`;
            }).join('');
            
            const balance = cTot - dTot;
            const balanceColor = balance >= 0 ? 'bg-teal-600' : 'bg-red-600';

            document.getElementById('stats').innerHTML = `
                <div class="bg-red-50 border border-red-200 p-4 rounded-xl text-center"><p class="text-[10px] uppercase font-bold text-red-400">Total Debit (Out)</p><p class="text-xl font-black text-red-600">${dTot.toFixed(2)}</p></div>
                <div class="bg-teal-50 border border-teal-200 p-4 rounded-xl text-center"><p class="text-[10px] uppercase font-bold text-teal-400">Total Credit (In)</p><p class="text-xl font-black text-teal-600">${cTot.toFixed(2)}</p></div>
                <div class="${balanceColor} text-white p-4 rounded-xl shadow-lg text-center transition-colors duration-500"><p class="text-[10px] uppercase font-bold opacity-80">Net Balance</p><p class="text-xl font-black">${balance.toFixed(2)}</p></div>`;
        };
    </script>
</head>
<body class="bg-slate-50 p-4 md:p-8">
    <div class="max-w-5xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-end mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-black text-slate-900 leading-none">CASH LEDGER</h1>
                <p class="text-amber-500 font-bold text-xs tracking-[0.2em] mt-2 uppercase">Premium Modular Kitchens & Wardrobes</p>
            </div>
            <div class="no-print flex gap-2">
                <button onclick="toggleSettings(true)" class="bg-slate-800 text-white px-4 py-2 rounded-lg font-bold text-sm hover:bg-slate-700">Settings</button>
                <button onclick="window.print()" class="bg-white border border-slate-300 px-4 py-2 rounded-lg font-bold text-sm hover:bg-slate-50">Print</button>
            </div>
        </div>

        <div class="no-print flex flex-col md:flex-row gap-3 mb-6">
            <input id="search-bar" oninput="renderTable()" placeholder="Search particulars or remarks..." class="border border-slate-200 p-3 w-full rounded-xl shadow-sm input-focus bg-white">
            <select id="proj-filter" onchange="renderTable()" class="border border-slate-200 p-3 rounded-xl shadow-sm bg-white font-bold text-slate-600"></select>
        </div>

        <div class="no-print bg-white p-6 rounded-2xl shadow-xl border border-slate-100 mb-8">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-4">
                <div class="flex flex-col"><label class="text-[10px] font-black text-slate-400 mb-1 uppercase">Date</label><input id="date" type="date" class="border p-2 rounded-lg input-focus"></div>
                <div class="flex flex-col"><label class="text-[10px] font-black text-slate-400 mb-1 uppercase">Project</label><select id="proj" class="border p-2 rounded-lg input-focus"></select></div>
                <div class="flex flex-col md:col-span-2"><label class="text-[10px] font-black text-slate-400 mb-1 uppercase">Category</label><select id="part" class="border p-2 rounded-lg input-focus"></select></div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                <div class="flex flex-col md:col-span-1"><label class="text-[10px] font-black text-slate-400 mb-1 uppercase">Remarks</label><input id="remarks" type="text" placeholder="..." class="border p-2 rounded-lg input-focus"></div>
                <div class="flex flex-col"><label class="text-[10px] font-black text-slate-400 mb-1 uppercase text-red-500">Debit (Payment)</label><input id="debit" oninput="handleInput('debit','credit')" type="number" class="border p-2 rounded-lg input-focus font-bold"></div>
                <div class="flex flex-col"><label class="text-[10px] font-black text-slate-400 mb-1 uppercase text-teal-500">Credit (Receipt)</label><input id="credit" oninput="handleInput('credit','debit')" type="number" class="border p-2 rounded-lg input-focus font-bold"></div>
            </div>
            <button onclick="postEntry()" class="w-full bg-amber-500 text-slate-900 py-4 rounded-xl font-black text-xl shadow-lg hover:bg-amber-600 transition-transform active:scale-[0.98]">POST TRANSACTION</button>
        </div>

        <div id="stats" class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8"></div>

        <div class="bg-white shadow-2xl rounded-2xl overflow-hidden border border-slate-100">
            <table class="w-full text-left">
                <thead class="bg-slate-900 text-white text-[10px] uppercase tracking-widest">
                    <tr>
                        <th class="p-4">Date</th>
                        <th class="p-4">Project</th>
                        <th class="p-4">Particulars</th>
                        <th class="p-4 text-right">Debit (-)</th>
                        <th class="p-4 text-right">Credit (+)</th>
                        <th class="p-4 text-center no-print"></th>
                    </tr>
                </thead>
                <tbody id="ledger-body" class="divide-y divide-slate-50"></tbody>
            </table>
        </div>

        <div id="settings-view" class="hidden fixed inset-0 bg-slate-900/95 backdrop-blur-md flex items-center justify-center p-4 z-50">
            <div class="bg-white p-8 rounded-3xl w-full max-w-md shadow-2xl">
                <h2 class="font-black text-2xl text-slate-900 mb-6 uppercase italic">Configuration</h2>
                <div class="space-y-6">
                    <div>
                        <label class="text-xs font-black text-slate-400 block mb-2 uppercase">New Category</label>
                        <div class="flex gap-2">
                            <input id="new-categories" class="border p-2 flex-grow rounded-lg input-focus">
                            <button onclick="addSetting('categories')" class="bg-slate-900 text-white px-4 rounded-lg font-bold">+</button>
                        </div>
                        <div id="cat-list" class="mt-2 max-h-32 overflow-y-auto bg-slate-50 rounded-lg p-2"></div>
                    </div>
                    <div>
                        <label class="text-xs font-black text-slate-400 block mb-2 uppercase">New Project</label>
                        <div class="flex gap-2">
                            <input id="new-projects" class="border p-2 flex-grow rounded-lg input-focus">
                            <button onclick="addSetting('projects')" class="bg-slate-900 text-white px-4 rounded-lg font-bold">+</button>
                        </div>
                        <div id="proj-list" class="mt-2 max-h-32 overflow-y-auto bg-slate-50 rounded-lg p-2"></div>
                    </div>
                </div>
                <button onclick="toggleSettings(false)" class="w-full mt-8 bg-slate-100 text-slate-600 py-3 rounded-xl font-bold hover:bg-slate-200 transition">Close</button>
            </div>
        </div>
    </div>
</body>
</html>
